[custom]

;精简分流规则
;特点：简洁实用、地区分组自动测速、AI专用分组、便于长期维护
;规则来源：ACL4SSR + blackmatrix7 + 自定义

;设置规则标志位

; === 国内直连 ===
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/China/China.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/China/China_Classical.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/China/China_Domain.txt
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AirChina/AirChina.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaDNS/ChinaDNS.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaIPs/ChinaIPs_IP.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaIPs/ChinaIPs_Classical.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaIPsBGP/ChinaIPsBGP_IP.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaIPsBGP/ChinaIPsBGP_Classical.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_IP.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
ruleset=🎯 国内流量,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Domain.txt


; 系统性直连：去掉 no-resolve，让未收录的国内域名通过 IP 解析判定直连
ruleset=🎯 国内流量,[]GEOIP,CN

; === AI服务（综合） ===
ruleset=🧚 AI服务,clash-classic:https://raw.githubusercontent.com/cutethotw/ClashRule/refs/heads/main/Rule/AI.yaml
ruleset=🧚 AI服务,clash-classic:https://raw.githubusercontent.com/cutethotw/ClashRule/refs/heads/main/Rule/Claude.list

; === AI服务（细分补充） ===
; OpenAI / ChatGPT
ruleset=🧚 AI服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
; Google AI / Gemini / Bard
ruleset=🧚 AI服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml

; === 广告拦截 ===
ruleset=🛑 广告拦截,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AdvertisingLite/AdvertisingLite.yaml

; === 国外流量（含细分服务） ===
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Discord/Discord.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
ruleset=🚀 国外流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml

; === 漏网之鱼 ===
ruleset=🐟 漏网之鱼,[]FINAL

; ===== AI 服务 =====
custom_proxy_group=🤖 AI自动`url-test`(美|US|United States|新加坡|SG|Japan|JP|日)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🧚 AI服务`select`[]🤖 AI自动`[]🇺🇸 美国节点`[]🇸🇬 新加坡`[]✈️ 手动选择

; === 业务分组 ===
custom_proxy_group=🚀 国外流量`select`[]♻️ 自动选择`[]🔯 故障转移`[]✈️ 手动选择
custom_proxy_group=🎯 国内流量`select`[]DIRECT`[]♻️ 自动选择`[]✈️ 手动选择`[]🇨🇳 回国节点
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 国外流量`[]DIRECT`[]✈️ 手动选择

; === 基础分组 ===
custom_proxy_group=✈️ 手动选择`select`[]♻️ 自动选择`.*
custom_proxy_group=♻️ 自动选择`url-test`(^(?!.*(电信|联通|移动|剩余|流量|官网|客服|套餐|到期)).*)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`(^(?!.*(电信|联通|移动|剩余|流量|官网|客服|套餐|到期)).*)`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; === 地区分组（url-test 自动测速）===
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美|US|United States)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡`url-test`(新加坡|SG|shiche|狮城)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇨🇳 回国节点`url-test`(回国|国内|CN)
custom_proxy_group=🌍 其他`select`^(?!.*(港|HK|Hong Kong|HongKong|美|US|USA|United States|新加坡|SG|Singapore|shiche|狮城)).*$
;设置分组标志位

enable_rule_generator=true
overwrite_original_rules=true
